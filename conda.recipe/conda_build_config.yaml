# conda-build pins for PTSA.
#
# NOTE: the python × numpy build matrix is driven *externally*, one
# cell per conda-build invocation, NOT by a variant list here:
#
#   conda-build conda.recipe --python=3.12 --variants "{numpy: ['2']}" ...
#
# The GitHub Actions workflow (.github/workflows/build.yml) does exactly
# this via its strategy.matrix, and maint/build_matrix.sh does it for
# local builds. Each invocation builds one (python, numpy) cell in its
# own clean build env, so there is no cross-contamination.
#
# An earlier attempt declared the matrix here as zipped python/numpy
# lists (`zip_keys: [[python, numpy]]`). conda-build's variant hashing
# mis-associated the zipped cells — producing scrambled build envs
# (a py3.10 cell pulling py3.12 numpy) and even an empty package. Do
# NOT reintroduce a python/numpy matrix in this file; keep the cell
# selection in the per-invocation `--python` / `--variants` flags.
#
# pin_compatible('numpy', max_pin='x') in meta.yaml's run: caps each
# binary to the major version it was built against, so mamba installs
# the right cell for the user's numpy.
